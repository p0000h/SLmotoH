<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Моточасы StarLine</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Моточасы">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚗 Моточасы StarLine</h1>
            <p class="subtitle">Подсчёт моточасов</p>
        </header>

        <form id="loginForm">
            <div class="form-group">
                <label for="login">Логин StarLine</label>
                <input type="text" id="login" required placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label for="dateFrom">Дата начала отсчёта</label>
                <input type="date" id="dateFrom" required>
            </div>
            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" id="useProxy" checked>
                    Использовать CORS-прокси
                </label>
            </div>
            <button type="submit" id="submitBtn">Посчитать моточасы</button>
        </form>

        <div id="captchaBlock" class="hidden">
            <h3>🔒 Требуется капча</h3>
            <img id="captchaImg" src="" alt="Капча" class="captcha-img">
            <button type="button" id="refreshCaptcha" class="btn-small">🔄 Обновить</button>
            <input type="text" id="captchaCode" placeholder="Код с картинки">
            <button type="button" id="submitCaptcha" class="btn-primary">Продолжить</button>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Загружаем данные...</p>
        </div>

        <div id="error" class="hidden"></div>

        <div id="results" class="hidden">
            <div class="total-card">
                <div class="total-label">Всего моточасов</div>
                <div class="total-value" id="totalHours">0</div>
                <div class="total-sub" id="totalMinutes">0 минут</div>
            </div>
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-label">Дней с двигателем</div>
                    <div class="stat-value" id="daysCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Запусков</div>
                    <div class="stat-value" id="startsCount">0</div>
                </div>
            </div>
            <h2>По дням</h2>
            <div id="dailyResults"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
