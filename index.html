<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Моточасы StarLine</title>
    
    <!-- Подключение стилей (ОТНОСИТЕЛЬНЫЙ путь, без слэша в начале!) -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Моточасы">
    
    <!-- Иконка для iOS (можно пока закомментировать, если иконок нет) -->
    <!-- <link rel="apple-touch-icon" href="icons/icon-192.png"> -->
</head>
<body>
    <div class="container">
        <header>
            <h1>🚗 Моточасы StarLine</h1>
            <p class="subtitle">Подсчёт моточасов по событиям запуска/остановки двигателя</p>
        </header>

        <form id="loginForm">
            <div class="form-group">
                <label for="appId">APP ID</label>
                <input type="text" id="appId" required placeholder="Из личного кабинета my.starline.ru">
            </div>
            
            <div class="form-group">
                <label for="appSecret">APP Secret</label>
                <input type="password" id="appSecret" required placeholder="Секретный ключ приложения">
            </div>
            
            <div class="form-group">
                <label for="login">Логин StarLine</label>
                <input type="text" id="login" required placeholder="email@example.com">
            </div>
            
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" required placeholder="Пароль от аккаунта StarLine">
            </div>
            
            <div class="form-group">
                <label for="dateFrom">Дата начала отсчёта</label>
                <input type="date" id="dateFrom" required>
            </div>
            
            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" id="useProxy" checked>
                    Использовать CORS-прокси
                </label>
            </div>
            
            <button type="submit" id="submitBtn">Посчитать моточасы</button>
        </form>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Загружаем данные из StarLine...</p>
        </div>

        <div id="error" class="hidden"></div>

        <div id="results" class="hidden">
            <div class="total-card">
                <div class="total-label">Всего моточасов</div>
                <div class="total-value" id="totalHours">0</div>
                <div class="total-sub" id="totalMinutes">0 минут</div>
            </div>

            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-label">Дней с двигателем</div>
                    <div class="stat-value" id="daysCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Запусков</div>
                    <div class="stat-value" id="startsCount">0</div>
                </div>
            </div>

            <h2>По дням</h2>
            <div id="dailyResults"></div>
        </div>
    </div>

    <!-- Подключение скрипта (ОТНОСИТЕЛЬНЫЙ путь!) -->
    <script src="script.js"></script>
    
    <!-- Регистрация Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ Service Worker зарегистрирован'))
                    .catch(err => console.error('❌ Ошибка SW', err));
            });
        }
    </script>
</body>
</html>
